<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TCG Manager{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f9f9f9;
        }

        nav {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            padding: 10px;
            background: #fff;
            border-radius: 8px;
        }

        nav a {
            text-decoration: none;
            color: #333;
        }

        nav a:hover {
            color: #e74c3c;
        }
    </style>
</head>

<body>
    <nav>
        <strong>🃏 TCG Manager</strong>
        {% if current_user.is_authenticated %}
        <a href="/dashboard">Dashboard</a>
        <a href="/add">Add Card</a>
        <a href="/logout">Logout</a>
        {% else %}
        <a href="/login">Login</a>
        <a href="/register">Register</a>
        {% endif %}
    </nav>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    {% for message in messages %}
    <div style="background:#ffe0e0; padding:10px; border-radius:6px; margin-bottom:10px;">{{ message }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</body>

</html>
